<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanline — QR Code Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg: #0A0F0E;
    --surface: #10716b0d;
    --panel: #121917;
    --panel-2: #17201D;
    --border: #223330;
    --border-soft: #1A2622;
    --text: #E8F5F2;
    --text-muted: #7FA69C;
    --text-dim: #4C645F;
    --accent: #2DD4BF;
    --accent-dim: #12403B;
    --accent-glow: rgba(45, 212, 191, 0.18);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 8%, var(--accent-glow), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(45,212,191,0.08), transparent 45%);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .frame{
    width: 100%;
    max-width: 480px;
  }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .eyebrow .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.35; }
  }

  h1{
    font-family: var(--mono);
    font-weight: 700;
    font-size: 30px;
    letter-spacing: -0.01em;
    margin: 0 0 6px 0;
  }
  h1 span{ color: var(--accent); }

  .sub{
    color: var(--text-muted);
    font-size: 14.5px;
    line-height: 1.5;
    margin: 0 0 28px 0;
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 22px;
  }

  label{
    display:block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  textarea{
    width: 100%;
    resize: vertical;
    min-height: 78px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  textarea::placeholder{ color: var(--text-dim); }
  textarea:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .row{
    display:flex;
    gap: 16px;
    margin-top: 18px;
  }
  .row > div{ flex:1; }

  .color-field{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .color-field input[type="color"]{
    -webkit-appearance:none;
    appearance:none;
    width: 28px; height: 28px;
    border:none;
    border-radius: 7px;
    padding:0;
    background:none;
    cursor:pointer;
  }
  .color-field input[type="color"]::-webkit-color-swatch-wrapper{ padding:0; }
  .color-field input[type="color"]::-webkit-color-swatch{ border:none; border-radius:7px; }
  .color-field span{
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-muted);
  }

  .logo-row{
    margin-top: 18px;
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .file-btn{
    flex:1;
    position:relative;
    background: var(--panel-2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-muted);
    text-align:center;
    cursor:pointer;
    transition: border-color .15s ease, color .15s ease;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-btn:hover{ border-color: var(--accent); color: var(--text); }
  .file-btn input{
    position:absolute; inset:0; opacity:0; cursor:pointer;
  }
  .clear-logo{
    display:none;
    font-family: var(--mono);
    font-size: 12px;
    color: #E5786B;
    background: none;
    border: 1px solid #3A2320;
    border-radius: 10px;
    padding: 11px 12px;
    cursor:pointer;
    white-space:nowrap;
  }
  .clear-logo:hover{ background: #2A1614; }

  .generate{
    width:100%;
    margin-top: 22px;
    background: var(--accent);
    color: #06201C;
    border:none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .generate:hover{ box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-1px); }
  .generate:active{ transform: translateY(0); }

  .result{
    margin-top: 22px;
    display:none;
  }
  .result.show{ display:block; }

  .viewfinder{
    position:relative;
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 28px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .viewfinder canvas{
    max-width: 100%;
    border-radius: 6px;
    position:relative;
    z-index: 2;
  }
  .corner{
    position:absolute;
    width:22px; height:22px;
    border: 2px solid var(--accent);
    opacity:.85;
    z-index:3;
  }
  .corner.tl{ top:12px; left:12px; border-right:none; border-bottom:none; border-top-left-radius:6px; }
  .corner.tr{ top:12px; right:12px; border-left:none; border-bottom:none; border-top-right-radius:6px; }
  .corner.bl{ bottom:12px; left:12px; border-right:none; border-top:none; border-bottom-left-radius:6px; }
  .corner.br{ bottom:12px; right:12px; border-left:none; border-top:none; border-bottom-right-radius:6px; }

  .scanline{
    position:absolute;
    left: 10%; right:10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px var(--accent);
    top: 10%;
    z-index: 4;
    opacity: 0;
  }
  .scanline.animate{
    animation: scan 1.1s cubic-bezier(.4,0,.2,1);
  }
  @keyframes scan{
    0%{ top:10%; opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:1; }
    100%{ top:88%; opacity:0; }
  }

  .download{
    width:100%;
    margin-top: 14px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .download:hover{ border-color: var(--accent); background: var(--accent-dim); }

  .hint{
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align:center;
    letter-spacing: 0.03em;
  }

  #qr-hidden{ position:absolute; left:-9999px; top:-9999px; }

  @media (prefers-reduced-motion: reduce){
    .scanline.animate{ animation: none; opacity:0; }
    .eyebrow .dot{ animation: none; }
  }
</style>
</head>
<body>

<div class="frame">
  <div class="eyebrow"><span class="dot"></span>READY TO SCAN</div>
  <h1>Scan<span>line</span></h1>
  <p class="sub">Turn any link or text into a QR code. Set your colors, drop in a logo, download instantly — nothing leaves your browser.</p>

  <div class="card">
    <label for="text-input">Text or URL</label>
    <textarea id="text-input" placeholder="https://your-link.com"></textarea>

    <div class="row">
      <div>
        <label>QR Color</label>
        <div class="color-field">
          <input type="color" id="qr-color" value="#0A0F0E">
          <span id="qr-color-label">#0A0F0E</span>
        </div>
      </div>
      <div>
        <label>Background</label>
        <div class="color-field">
          <input type="color" id="bg-color" value="#E8F5F2">
          <span id="bg-color-label">#E8F5F2</span>
        </div>
      </div>
    </div>

    <div class="logo-row">
      <label class="file-btn" id="file-label">
        + Add logo (optional)
        <input type="file" id="logo-input" accept="image/*">
      </label>
      <button class="clear-logo" id="clear-logo">Remove</button>
    </div>

    <button class="generate" id="generate-btn">Generate QR Code</button>
  </div>

  <div class="result" id="result">
    <div class="viewfinder">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scanline" id="scanline"></div>
      <canvas id="output-canvas" width="380" height="380"></canvas>
    </div>
    <button class="download" id="download-btn">Download PNG</button>
  </div>

  <div class="hint">Runs entirely client-side — your text and logo never leave this page</div>
</div>

<div id="qr-hidden"></div>

<script>
  const textInput = document.getElementById('text-input');
  const qrColorInput = document.getElementById('qr-color');
  const bgColorInput = document.getElementById('bg-color');
  const qrColorLabel = document.getElementById('qr-color-label');
  const bgColorLabel = document.getElementById('bg-color-label');
  const logoInput = document.getElementById('logo-input');
  const fileLabel = document.getElementById('file-label');
  const clearLogoBtn = document.getElementById('clear-logo');
  const generateBtn = document.getElementById('generate-btn');
  const resultBox = document.getElementById('result');
  const outputCanvas = document.getElementById('output-canvas');
  const scanline = document.getElementById('scanline');
  const downloadBtn = document.getElementById('download-btn');
  const hiddenDiv = document.getElementById('qr-hidden');

  let logoImage = null;

  qrColorInput.addEventListener('input', () => qrColorLabel.textContent = qrColorInput.value.toUpperCase());
  bgColorInput.addEventListener('input', () => bgColorLabel.textContent = bgColorInput.value.toUpperCase());

  logoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => { logoImage = img; };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    fileLabel.firstChild.textContent = file.name.length > 22 ? file.name.slice(0, 19) + '...' : file.name;
    clearLogoBtn.style.display = 'inline-block';
  });

  clearLogoBtn.addEventListener('click', () => {
    logoImage = null;
    logoInput.value = '';
    fileLabel.firstChild.textContent = '+ Add logo (optional)';
    clearLogoBtn.style.display = 'none';
  });

  function generate() {
    const text = textInput.value.trim();
    if (!text) {
      textInput.style.borderColor = '#E5786B';
      textInput.focus();
      setTimeout(() => textInput.style.borderColor = '', 900);
      return;
    }

    hiddenDiv.innerHTML = '';
    new QRCode(hiddenDiv, {
      text: text,
      width: 380,
      height: 380,
      colorDark: qrColorInput.value,
      colorLight: bgColorInput.value,
      correctLevel: QRCode.CorrectLevel.H
    });

    setTimeout(() => {
      const sourceEl = hiddenDiv.querySelector('canvas') || hiddenDiv.querySelector('img');
      const ctx = outputCanvas.getContext('2d');
      ctx.clearRect(0, 0, 380, 380);
      ctx.fillStyle = bgColorInput.value;
      ctx.fillRect(0, 0, 380, 380);
      ctx.drawImage(sourceEl, 0, 0, 380, 380);

      if (logoImage) {
        const logoSize = 72;
        const cx = (380 - logoSize) / 2;
        const cy = (380 - logoSize) / 2;
        const pad = 8;
        ctx.fillStyle = bgColorInput.value;
        roundRect(ctx, cx - pad, cy - pad, logoSize + pad * 2, logoSize + pad * 2, 10);
        ctx.fill();
        ctx.save();
        roundRect(ctx, cx, cy, logoSize, logoSize, 8);
        ctx.clip();
        ctx.drawImage(logoImage, cx, cy, logoSize, logoSize);
        ctx.restore();
      }

      resultBox.classList.add('show');
      scanline.classList.remove('animate');
      void scanline.offsetWidth;
      scanline.classList.add('animate');
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 60);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  generateBtn.addEventListener('click', generate);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
  });

  downloadBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = outputCanvas.toDataURL('image/png');
    link.click();
  });
</script>

</body>
</html>
